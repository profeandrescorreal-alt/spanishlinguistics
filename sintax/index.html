<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body{font-family:system-ui;padding:18px}
  .canvas{padding:30px;border:1px solid #ddd;display:flex;justify-content:center}
  .row{display:flex;gap:40px;align-items:flex-end}
  .node{display:flex;flex-direction:column;align-items:center}
  .label{font-weight:700;margin-bottom:6px}
  .word{color:#c00;font-weight:700;margin-top:8px}
  svg{position:absolute;pointer-events:none}
  .wrap{position:relative}
</style>
</head>
<body>
<h3>Recta en ángulo (1 hijo)</h3>
<div class="canvas">
  <div class="wrap">
    <div class="row">
      <div class="node" id="parent"><div class="label">SN</div><div class="word">—</div></div>
      <div class="node" id="child"><div class="label">N</div><div class="word">hoja</div></div>
    </div>
    <svg id="svg" width="500" height="160"></svg>
  </div>
</div>

<script>
const svg=document.getElementById('svg');
const p=document.getElementById('parent').querySelector('.label').getBoundingClientRect();
const c=document.getElementById('child').querySelector('.label').getBoundingClientRect();
const parentX = p.left + p.width/2 - svg.getBoundingClientRect().left;
const parentBottom = p.top + p.height - svg.getBoundingClientRect().top;
const childX = c.left + c.width/2 - svg.getBoundingClientRect().left;
const childTop = c.top - svg.getBoundingClientRect().top;
const midY = parentBottom + 20;
const path = document.createElementNS('http://www.w3.org/2000/svg','path');
path.setAttribute('d',`M ${parentX} ${parentBottom} L ${parentX} ${midY} L ${childX} ${midY} L ${childX} ${childTop}`);
path.setAttribute('stroke','#444'); path.setAttribute('fill','none'); path.setAttribute('stroke-width','2');
svg.appendChild(path);
</script>
</body>
</html>
