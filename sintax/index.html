<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body{font-family:system-ui;padding:18px}
  .wrap{position:relative;border:1px solid #ddd;padding:20px;overflow:auto}
  .row{display:flex;gap:28px;align-items:flex-end;justify-content:center}
  .node{display:flex;flex-direction:column;align-items:center}
  .label{font-weight:700;margin-bottom:6px}
  .word{color:#c00;font-weight:700;margin-top:8px}
  svg{position:absolute;left:0;top:0;pointer-events:none}
</style>
</head>
<body>
<h3>Mixto: recta si 1 hijo, curva si varios — todo alineado abajo</h3>
<div class="wrap" id="wrap" style="width:760px;height:220px">
  <div class="row" id="tree">
    <div class="node" id="root"><div class="label">SN</div><div class="word">—</div></div>
    <div style="display:flex;gap:24px;align-items:flex-end">
      <div class="node"><div class="label">Det</div><div class="word">los</div></div>
      <div class="node"><div class="label">N</div><div class="word">hijos</div></div>
      <div class="node"><div class="label">SP</div><div class="word">de Nancy</div></div>
    </div>
  </div>
  <svg id="svg" width="760" height="220"></svg>
</div>

<script>
/* same logic as before: draw vertical->bar->curves for multiple children */
const svg=document.getElementById('svg');
const rootLabel=document.getElementById('root').querySelector('.label').getBoundingClientRect();
const parentX = rootLabel.left + rootLabel.width/2 - svg.getBoundingClientRect().left;
const parentBottom = rootLabel.top + rootLabel.height - svg.getBoundingClientRect().top;
const children = Array.from(document.querySelectorAll('#tree > div:nth-child(2) .node')).map(n=>n.querySelector('.label').getBoundingClientRect());
const xs = children.map(c=>c.left + c.width/2 - svg.getBoundingClientRect().left);
const barY = parentBottom + 16;
svg.innerHTML = `<path d="M ${parentX} ${parentBottom} L ${parentX} ${barY}" stroke="#444" fill="none" stroke-width="2"/>`;
const minX=Math.min(...xs), maxX=Math.max(...xs);
svg.innerHTML += `<path d="M ${minX} ${barY} L ${maxX} ${barY}" stroke="#444" fill="none" stroke-width="2"/>`;
xs.forEach(x=>{
  const startX=x, startY=barY, endX=x, endY=(children[0].top - svg.getBoundingClientRect().top)+10+40;
  const c1y = startY + 18, c2y = endY - 18;
  svg.innerHTML += `<path d="M ${startX} ${startY} C ${startX} ${c1y} ${endX} ${c2y} ${endX} ${endY}" stroke="#444" fill="none" stroke-width="2"/>`;
});
</script>
</body>
</html>
