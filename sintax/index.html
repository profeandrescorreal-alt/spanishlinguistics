
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body{font-family:system-ui;padding:18px}
  .canvas{padding:30px;border:1px solid #ddd;display:flex;justify-content:center}
  .row{display:flex;gap:24px;align-items:flex-end}
  .node{display:flex;flex-direction:column;align-items:center}
  .label{font-weight:700;margin-bottom:6px}
  .word{color:#c00;font-weight:700;margin-top:8px}
  svg{position:absolute;pointer-events:none}
  .wrap{position:relative}
</style>
</head>
<body>
<h3>Curvas Bézier (varios hijos)</h3>
<div class="canvas">
  <div class="wrap">
    <div class="row">
      <div class="node" id="parent"><div class="label">SN</div><div class="word">—</div></div>
      <div style="display:flex;gap:24px;align-items:flex-end">
        <div class="node"><div class="label">Det</div><div class="word">la</div></div>
        <div class="node"><div class="label">N</div><div class="word">hoja</div></div>
        <div class="node"><div class="label">SP</div><div class="word">de lata</div></div>
      </div>
    </div>
    <svg id="svg" width="700" height="200"></svg>
  </div>
</div>

<script>
const svg=document.getElementById('svg');
const parentLabel=document.getElementById('parent').querySelector('.label').getBoundingClientRect();
const parentX = parentLabel.left + parentLabel.width/2 - svg.getBoundingClientRect().left;
const parentBottom = parentLabel.top + parentLabel.height - svg.getBoundingClientRect().top;
const barY = parentBottom + 18;
// vertical to bar
const v=document.createElementNS('http://www.w3.org/2000/svg','path');
v.setAttribute('d',`M ${parentX} ${parentBottom} L ${parentX} ${barY}`);
v.setAttribute('stroke','#444'); v.setAttribute('fill','none'); v.setAttribute('stroke-width','2');
svg.appendChild(v);
// children centers
const children = Array.from(document.querySelectorAll('.row > div:nth-child(2) .node')).map(n=>n.querySelector('.label').getBoundingClientRect());
const xs = children.map(c=>c.left + c.width/2 - svg.getBoundingClientRect().left);
const minX=Math.min(...xs), maxX=Math.max(...xs);
// horizontal bar
const h=document.createElementNS('http://www.w3.org/2000/svg','path');
h.setAttribute('d',`M ${minX} ${barY} L ${maxX} ${barY}`);
h.setAttribute('stroke','#444'); h.setAttribute('fill','none'); h.setAttribute('stroke-width','2');
svg.appendChild(h);
// curves to each child
xs.forEach(x=>{
  const startX = x, startY = barY;
  const endX = x;
  const endY = (document.querySelectorAll('.row > div:nth-child(2) .node')[0].getBoundingClientRect().top - svg.getBoundingClientRect().top) + 10 + 40; // approximate
  const c1x = startX, c1y = startY + 20;
  const c2x = endX, c2y = endY - 20;
  const pth = document.createElementNS('http://www.w3.org/2000/svg','path');
  pth.setAttribute('d',`M ${startX} ${startY} C ${c1x} ${c1y} ${c2x} ${c2y} ${endX} ${endY}`);
  pth.setAttribute('stroke','#444'); pth.setAttribute('fill','none'); pth.setAttribute('stroke-width','2');
  svg.appendChild(pth);
});
</script>
</body>
</html>
