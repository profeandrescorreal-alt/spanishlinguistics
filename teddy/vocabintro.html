<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teddy</title>
  <style>
    :root{
      --bg1:#fff7ed;
      --bg2:#eef2ff;
      --card:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --primary:#6d5dfc;
      --primary-dark:#4f46e5;
      --accent:#ffb703;
      --green:#16a34a;
      --green-bg:#dcfce7;
      --red:#dc2626;
      --red-bg:#fee2e2;
      --blue-bg:#eff6ff;
      --line:#e5e7eb;
      --shadow:0 18px 45px rgba(31,41,55,.14);
      --radius:26px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:
        radial-gradient(circle at top left,rgba(255,183,3,.28),transparent 30rem),
        radial-gradient(circle at bottom right,rgba(109,93,252,.24),transparent 34rem),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      padding:24px;
    }

    .app{width:min(1080px,100%);margin:0 auto}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:22px;
    }

    .brand{display:flex;align-items:center;gap:14px}

    .logo{
      width:58px;height:58px;border-radius:19px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--primary),#22c55e);
      color:white;font-size:1.9rem;box-shadow:0 12px 25px rgba(79,70,229,.25)
    }

    h1,h2,h3{margin:0;line-height:1.1}
    h1{font-size:clamp(2rem,4vw,3.3rem);letter-spacing:-.045em}
    h2{font-size:clamp(1.45rem,2.5vw,2.25rem);letter-spacing:-.035em}
    h3{font-size:1.05rem}
    p{line-height:1.55}

    .subtitle{color:var(--muted);font-weight:650;margin:.3rem 0 0}

    .btn{
      border:0;cursor:pointer;font:inherit;font-weight:900;
      background:var(--primary);color:white;
      padding:13px 18px;border-radius:16px;
      box-shadow:0 10px 22px rgba(79,70,229,.25);
      transition:.18s ease;
    }
    .btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn.secondary,.btn.ghost{background:white;color:var(--primary-dark);border:1px solid #c7d2fe;box-shadow:none}
    .btn.ghost{background:rgba(255,255,255,.76)}
    .btn.small{padding:10px 13px;border-radius:13px;font-size:.92rem}

    .hero,.game-card,.result-card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.8);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }

    .hero{padding:42px;position:relative;overflow:hidden}
    .hero::after{
      content:"Teddy";
      position:absolute;right:-18px;top:14px;
      font-size:clamp(60px,13vw,145px);font-weight:1000;
      color:rgba(109,93,252,.08);transform:rotate(-7deg);pointer-events:none;
    }

    .mission-grid{
      margin-top:26px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(235px,1fr));
      gap:14px;
    }

    .mission-card{
      text-align:left;background:white;color:var(--ink);
      border:2px solid var(--line);border-radius:22px;
      padding:18px;display:flex;gap:14px;align-items:flex-start;
      box-shadow:0 8px 18px rgba(31,41,55,.06);
      cursor:pointer;transition:.18s ease;
    }
    .mission-card:hover{border-color:var(--primary);background:#f5f3ff;transform:translateY(-1px)}
    .mission-number{
      width:42px;height:42px;border-radius:15px;
      display:grid;place-items:center;background:#eef2ff;color:var(--primary-dark);
      font-size:1.25rem;font-weight:950;flex:0 0 auto;
    }
    .mission-card h3{margin-bottom:6px}
    .mission-card p{margin:0;color:var(--muted);font-weight:650;font-size:.94rem}

    .game-card{padding:clamp(22px,4vw,40px)}
    .game-header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}
    .activity-label{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;background:#fff7ed;color:#c2410c;
      border:1px solid #fed7aa;border-radius:999px;
      font-weight:950;font-size:.85rem;margin-bottom:12px;
    }
    .mission-title{color:var(--primary-dark)}

    .progress-wrap{margin:18px 0 24px}
    .progress-row{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-weight:850;font-size:.92rem;margin-bottom:8px}
    .progress-track{height:14px;background:#f8fafc;border:1px solid rgba(109,93,252,.18);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),#22c55e);border-radius:999px;transition:width .3s ease}

    .context-box,.prompt-box,.inventory-box,.target-box{
      background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;
    }
    .context-box{background:#fffbeb;border-left:6px solid var(--accent);font-weight:800}
    .prompt-box .prompt{font-size:clamp(1.35rem,3vw,2.1rem);font-weight:1000;letter-spacing:-.02em}
    .mini-note{color:var(--muted);font-size:.93rem;font-weight:650;margin-top:8px}

    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:20px 0}
    .option{
      text-align:left;background:white;color:var(--ink);border:2px solid var(--line);
      padding:16px;border-radius:18px;font-weight:900;min-height:64px;
      display:flex;gap:10px;align-items:center;cursor:pointer;transition:.18s ease;
    }
    .option:hover:not(:disabled){border-color:#c7d2fe;background:#f5f3ff;transform:translateY(-1px)}
    .option.selected{border-color:var(--primary);background:#eef2ff}
    .option.correct{border-color:var(--green);background:var(--green-bg)}
    .option.incorrect{border-color:var(--red);background:var(--red-bg)}
    .letter{
      width:30px;height:30px;border-radius:10px;display:inline-grid;place-items:center;
      background:#eef2ff;color:var(--primary-dark);font-weight:1000;flex:0 0 auto;
    }

    .dialogue-area{display:grid;gap:16px;margin-top:18px}
    .dialogue-line{
      display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:center;
      background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px;
    }
    .speaker{font-weight:1000;color:var(--primary-dark)}
    .slot{
      min-height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px;
      background:white;border:2px dashed #cbd5e1;border-radius:16px;padding:12px 14px;font-weight:900;
    }
    .slot.filled{border-style:solid;border-color:#c7d2fe}
    .slot.correct-slot{border-color:var(--green);background:var(--green-bg)}
    .slot.incorrect-slot{border-color:var(--red);background:var(--red-bg)}
    .tile-bank{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:18px}
    .tile{
      background:white;border:2px solid var(--line);border-radius:16px;padding:14px;font-weight:900;text-align:center;cursor:pointer;transition:.18s ease;
    }
    .tile:hover:not(:disabled){border-color:var(--primary);background:#f5f3ff;transform:translateY(-1px)}
    .tile.disabled{opacity:.35;cursor:default}

    .match-grid,.frame-grid,.sort-grid{display:grid;gap:12px;margin-top:18px}
    .match-grid{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
    .match-card,.frame-card,.sort-row{
      background:white;border:1px solid var(--line);border-radius:18px;padding:16px;
    }
    .match-left,.frame-label,.sort-text{font-weight:1000;font-size:1.14rem;margin-bottom:10px}
    select,.type-input{
      width:100%;padding:12px 14px;border-radius:14px;border:2px solid var(--line);
      background:white;font:inherit;font-weight:800;color:var(--ink);
    }
    select:focus,.type-input:focus{outline:none;border-color:var(--primary)}
    select.correct-select,.type-input.correct-input{border-color:var(--green);background:var(--green-bg)}
    select.incorrect-select,.type-input.incorrect-input{border-color:var(--red);background:var(--red-bg)}
    .frame-grid{grid-template-columns:repeat(auto-fit,minmax(270px,1fr))}
    .frame-line{font-size:1.08rem;font-weight:800;line-height:1.55}
    .sort-row{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(180px,.75fr);gap:12px;align-items:center}

    .inventory-box ul{margin:8px 0 0;padding-left:22px;font-weight:750}



    .flash-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
      gap:14px;
      margin-top:20px;
    }
    .flash-card{
      min-height:150px;
      border:0;
      background:transparent;
      perspective:900px;
      cursor:pointer;
      font:inherit;
      padding:0;
    }
    .flash-inner{
      display:block;
      position:relative;
      width:100%;
      min-height:150px;
      transition:transform .45s ease;
      transform-style:preserve-3d;
      -webkit-transform-style:preserve-3d;
    }
    .flash-card.flipped .flash-inner{transform:rotateY(180deg)}
    .flash-face{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;text-align:center;
      border:2px solid var(--line);border-radius:22px;
      background:white;box-shadow:0 8px 18px rgba(31,41,55,.06);
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      padding:16px;
    }
    .flash-front{background:#fff7ed;border-color:#fed7aa}
    .flash-back{background:#eef2ff;border-color:#c7d2fe;transform:rotateY(180deg)}
    .flash-emoji{font-size:2.2rem;line-height:1}
    .flash-word{font-size:1.2rem;font-weight:1000;color:var(--ink)}
    .flash-meaning{font-size:1.05rem;font-weight:900;color:var(--primary-dark)}
    .flash-hint{text-align:center;color:var(--muted);font-weight:750;margin-top:12px}

    .feedback{display:none;margin-top:18px;padding:16px 18px;border-radius:18px;font-weight:800;border:1px solid var(--line)}
    .feedback.show{display:block}
    .feedback.ok{background:var(--green-bg);border-color:#86efac;color:#166534}
    .feedback.bad{background:var(--red-bg);border-color:#fecaca;color:#991b1b}
    .answer-line{margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.1)}

    .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:24px}
    .hidden{display:none!important}

    .result-card{text-align:center;padding:46px 28px}
    .score-num{font-size:clamp(2.6rem,8vw,5rem);font-weight:1000;color:var(--primary-dark);margin:20px 0 6px}

    @media(max-width:720px){
      body{padding:14px}
      .topbar,.game-header{flex-direction:column;align-items:flex-start}
      .hero,.game-card{padding:22px;border-radius:24px}
      .options,.sort-row{grid-template-columns:1fr}
      .dialogue-line{grid-template-columns:1fr}
      .controls .btn{flex:1 1 auto}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🎯</div>
        <div>
          <h1 id="pageTitle">Teddy</h1>
          <p class="subtitle" id="pageSubtitle">Spanish Vocabulary Missions</p>
        </div>
      </div>
      <button class="btn ghost hidden" id="topMenuBtn">Main menu</button>
    </header>

    <main id="menuView">
      <section class="hero">
        <h2>Ready to practice?</h2>
        <p class="subtitle">Choose a mission or start full practice. You will see the correct answer only after you try.</p>
        <div class="controls" style="margin-top:24px;">
          <button class="btn" id="allPracticeBtn">Start full practice</button>
        </div>
        <div class="mission-grid" id="missionGrid"></div>
      </section>
    </main>

    <main id="gameView" class="hidden">
      <section class="game-card">
        <div class="game-header">
          <div>
            <span class="activity-label" id="activityLabel">Mission</span>
            <h2 class="mission-title" id="missionTitle">Mission title</h2>
            <p class="subtitle" id="missionInstruction">Instruction</p>
          </div>
          <button class="btn secondary" id="menuBtn">Main menu</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-row">
            <span id="progressText">Question 1 of 10</span>
            <span id="scoreText">Score: 0</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div id="questionArea"></div>
        <div class="feedback" id="feedbackBox"></div>

        <div class="controls">
          <button class="btn secondary hidden" id="undoBtn">Undo</button>
          <button class="btn secondary hidden" id="resetBtn">Reset</button>
          <button class="btn" id="checkBtn">Check answer</button>
          <button class="btn hidden" id="nextBtn">Next</button>
        </div>
      </section>
    </main>

    <main id="resultView" class="hidden">
      <section class="result-card">
        <h2>Mission complete!</h2>
        <div class="score-num" id="finalScore">0 / 0</div>
        <p class="subtitle" id="finalMessage">Good work.</p>
        <div class="controls" style="justify-content:center;">
          <button class="btn" id="tryAgainBtn">Try again</button>
          <button class="btn secondary" id="resultsMenuBtn">Main menu</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const letters = ["A","B","C","D","E","F","G","H"];
    const $ = id => document.getElementById(id);

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeText(str){
      return String(str || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[¿?¡!.,]/g,"")
        .replace(/\s+/g," ");
    }

    function choice(activity, context, prompt, options, answer, feedback){
      return {type:"choice", activity, context, prompt, options, answer, feedback};
    }

    function dialogue(activity, instruction, speakers, tiles, accepted, feedback){
      return {type:"dialogue", activity, instruction, speakers, tiles, accepted, feedback};
    }

    function matching(activity, instruction, left, pairs){
      return {type:"matching", activity, instruction, left, pairs, right:Object.values(pairs)};
    }

    function frame(activity, instruction, context, parts, displayAnswer){
      return {type:"frame", activity, instruction, context, parts, displayAnswer};
    }

    function sorting(activity, instruction, groups, cards){
      return {type:"sorting", activity, instruction, groups, cards};
    }

    function cards(activity, instruction, cards){
      return {type:"cards", activity, instruction, cards, noScore:true};
    }

    function typeAnswer(activity, instruction, context, prompt, answers, displayAnswer, feedback){
      return {type:"type", activity, instruction, context, prompt, answers, displayAnswer, feedback};
    }

    const missions = [
      {
        id:"greetings",
        title:"Greetings and goodbyes",
        desc:"Choose natural greetings, responses and closing expressions.",
        icon:"👋",
        items:() => [
          choice("What would you say?", "You greet someone.", null, ["Hola.","Adiós.","Gracias.","De nada."], "Hola.", "This situation needs a greeting."),
          choice("Choose the response", null, "¿Cómo estás?", ["Estoy bien.","Me llamo Ana.","Tengo 19 años.","Soy estudiante."], "Estoy bien.", "This question asks how someone feels."),
          choice("Choose the response", null, "Mucho gusto.", ["Igualmente.","Gracias.","Lo siento.","Hasta luego."], "Igualmente.", "This is a natural response to Mucho gusto."),
          choice("What would you say?", "You say thank you.", null, ["Gracias.","De nada.","Lo siento.","Nos vemos."], "Gracias.", "Choose the expression for saying thank you."),
          choice("What would you say?", "You say goodbye.", null, ["Nos vemos.","Buenos días.","Mucho gusto.","¿Qué tal?"], "Nos vemos.", "Choose a goodbye expression."),
          sorting("Greeting or goodbye?", "Place each expression in the correct group.", ["Greeting","Goodbye"], [
            {text:"Hola.", group:"Greeting"}, {text:"Buenos días.", group:"Greeting"}, {text:"Buenas tardes.", group:"Greeting"},
            {text:"Adiós.", group:"Goodbye"}, {text:"Nos vemos.", group:"Goodbye"}, {text:"Hasta mañana.", group:"Goodbye"}
          ])
        ]
      },
      {
        id:"introductions",
        title:"Introductions",
        desc:"Practice names, age, profession and short conversations.",
        icon:"🗣️",
        items:() => [
          choice("Ask a name", "You want to ask someone’s name informally.", null, ["¿Cómo te llamas?","¿Cómo estás?","¿Cuántos años tienes?","¿De dónde eres?"], "¿Cómo te llamas?", "Choose the question that asks for a name."),
          choice("Answer a name question", null, "¿Cómo te llamas?", ["Me llamo Ana.","Estoy bien.","Tengo 19 años.","Soy estudiante."], "Me llamo Ana.", "This answers a name question."),
          choice("Answer an age question", null, "¿Cuántos años tienes?", ["Tengo 19 años.","Me llamo Ana.","Soy estudiante.","Son las dos."], "Tengo 19 años.", "This answers an age question."),
          choice("Answer a profession question", null, "¿A qué te dedicas?", ["Soy estudiante.","Tengo 19 años.","Estoy bien.","Me llamo Ana."], "Soy estudiante.", "This answers what someone does."),
          typeAnswer("Write the chunk", "Type a natural answer in Spanish.", "Question: ¿Cómo te llamas?", null, ["me llamo ana", "me llamo Ana"], "Me llamo Ana.", "Good. This is the name chunk."),
          dialogue("Dialogue builder", "Click the tiles in a natural order.", ["A","B","A","B","A","B","A"], ["Igualmente.","¿Cómo te llamas?","Hola.","Me llamo Ana.","Mucho gusto.","Hola.","Nos vemos."], [["Hola.","Hola.","¿Cómo te llamas?","Me llamo Ana.","Mucho gusto.","Igualmente.","Nos vemos."]], "Good. The conversation starts with greetings and ends with a goodbye."),
          dialogue("Dialogue builder", "Keep each question together with its answer.", ["A","B","A","B","A","B"], ["Soy estudiante.","Tengo 19 años.","¿Cuántos años tienes?","¿A qué te dedicas?","Me llamo Ana.","¿Cómo te llamas?"], [
            ["¿Cómo te llamas?","Me llamo Ana.","¿Cuántos años tienes?","Tengo 19 años.","¿A qué te dedicas?","Soy estudiante."],
            ["¿Cómo te llamas?","Me llamo Ana.","¿A qué te dedicas?","Soy estudiante.","¿Cuántos años tienes?","Tengo 19 años."]
          ], "Good. Each question is matched with its answer."),
          sorting("Basic information chunks", "Place each expression in the correct group.", ["Name","Age","Profession"], [
            {text:"¿Cómo te llamas?", group:"Name"}, {text:"Me llamo Ana.", group:"Name"},
            {text:"¿Cuántos años tienes?", group:"Age"}, {text:"Tengo 19 años.", group:"Age"},
            {text:"¿A qué te dedicas?", group:"Profession"}, {text:"Soy estudiante.", group:"Profession"}
          ])
        ]
      },
      {
        id:"time",
        title:"Time",
        desc:"Practice current time, event time and time phrases.",
        icon:"🕒",
        items:() => [
          choice("Current time", "You want to know the current time.", null, ["¿Qué hora es?","¿A qué hora es?","Son las dos.","A las cinco."], "¿Qué hora es?", "Use this question for the current time."),
          choice("Current time or event time?", null, "¿Qué hora es?", ["Son las cinco de la tarde.","A las cinco de la tarde.","A la una.","A las dos."], "Son las cinco de la tarde.", "This question asks for the current time."),
          choice("Current time or event time?", null, "¿A qué hora es?", ["A las cinco de la tarde.","Son las cinco de la tarde.","Son las dos y cuarto.","Son las doce."], "A las cinco de la tarde.", "This question asks for the time of an event."),
          matching("Time match", "Match each time with the correct phrase.", ["12:00","12:20","12:15","12:30"], {"12:00":"Son las doce en punto.","12:20":"Son las doce y veinte.","12:15":"Son las doce y cuarto.","12:30":"Son las doce y media."}),
          matching("Time match", "Match each time with the correct phrase.", ["2:15","8:30","10:10","5:20"], {"2:15":"Son las dos y cuarto.","8:30":"Son las ocho y media.","10:10":"Son las diez y diez.","5:20":"Son las cinco y veinte."}),
          matching("Time match", "Match each time with the correct phrase.", ["8:45","9:55","4:40","12:55"], {"8:45":"Son las nueve menos cuarto.","9:55":"Son las diez menos cinco.","4:40":"Son las cinco menos veinte.","12:55":"Es la una menos cinco."}),
          dialogue("Time dialogue", "Click the tiles in the correct order.", ["A","B","A","B"], ["Son las dos y cuarto.","Gracias.","¿Qué hora es?","De nada."], [["¿Qué hora es?","Son las dos y cuarto.","Gracias.","De nada."]], "Good. The question asks for the current time.")
        ]
      },
      {
        id:"supplies",
        title:"School supplies and borrowing",
        desc:"Match school supplies and practice borrowing chunks.",
        icon:"🎒",
        items:() => [
          matching("Emoji match", "Match each emoji with the Spanish expression.", ["✏️","📏","📓","📕","✂️"], {"✏️":"el lápiz","📏":"la regla","📓":"el cuaderno","📕":"el libro","✂️":"las tijeras"}),
          matching("Emoji match", "Match each emoji with the Spanish expression.", ["💻","🧮","🎒","📱","🖊️"], {"💻":"la computadora","🧮":"la calculadora","🎒":"la mochila","📱":"la tableta","🖊️":"el bolígrafo"}),
          matching("Emoji match", "Match each emoji with the Spanish expression.", ["🖍️","✏️⚙️","👝","🎨","🧽"], {"🖍️":"el subrayador","✏️⚙️":"el sacapuntas","👝":"el estuche","🎨":"las pinturas","🧽":"la goma"}),
          choice("Definite article", null, "______ lápiz", ["el","la","las","una"], "el", "This noun uses el in this chunk."),
          choice("Definite article", null, "______ regla", ["la","el","los","un"], "la", "This noun uses la in this chunk."),
          choice("Definite article", null, "______ tijeras", ["las","la","el","los"], "las", "This noun uses las in this chunk."),

    function allPracticeItems(){
      return missions.flatMap(m => m.items().map(item => ({...item, missionTitle:m.title, missionDesc:m.desc}))).filter(item => !item.noScore);
    }

    let currentMission = null;
    let currentItems = [];
    let index = 0;
    let score = 0;
    let answered = false;
    let selectedOption = null;
    let builtTiles = [];
    let matchAnswers = {};
    let lastMissionId = null;

    const menuView = $("menuView");
    const gameView = $("gameView");
    const resultView = $("resultView");
    const questionArea = $("questionArea");
    const feedbackBox = $("feedbackBox");
    const checkBtn = $("checkBtn");
    const nextBtn = $("nextBtn");
    const undoBtn = $("undoBtn");
    const resetBtn = $("resetBtn");

    function initMenu(){
      const grid = $("missionGrid");
      grid.innerHTML = "";
      missions.forEach(m => {
        const card = document.createElement("button");
        card.className = "mission-card";
        card.innerHTML = `
          <div class="mission-number">${m.icon}</div>
          <div><h3>${escapeHtml(m.title)}</h3><p>${escapeHtml(m.desc)}</p></div>
        `;
        card.addEventListener("click", () => startMission(m.id));
        grid.appendChild(card);
      });
    }

    function showMenu(){
      menuView.classList.remove("hidden");
      gameView.classList.add("hidden");
      resultView.classList.add("hidden");
      $("topMenuBtn").classList.add("hidden");
      $("pageTitle").textContent = "Teddy";
      $("pageSubtitle").textContent = "Spanish Vocabulary Missions";
      $("progressFill").style.width = "0%";
    }

    function startMission(id){
      const mission = missions.find(m => m.id === id);
      currentMission = mission;
      lastMissionId = id;
      currentItems = mission.items().map(item => prepareItem({...item, missionTitle:mission.title, missionDesc:mission.desc}));
      index = 0;
      score = 0;
      menuView.classList.add("hidden");
      resultView.classList.add("hidden");
      gameView.classList.remove("hidden");
      $("topMenuBtn").classList.remove("hidden");
      $("pageTitle").textContent = mission.title;
      $("pageSubtitle").textContent = mission.desc;
      renderItem();
    }

    function startAllPractice(){
      currentMission = {id:"all", title:"Full practice", desc:"Practice all Teddy missions."};
      lastMissionId = "all";
      currentItems = shuffle(allPracticeItems()).map(item => prepareItem(item));
      index = 0;
      score = 0;
      menuView.classList.add("hidden");
      resultView.classList.add("hidden");
      gameView.classList.remove("hidden");
      $("topMenuBtn").classList.remove("hidden");
      $("pageTitle").textContent = "Full practice";
      $("pageSubtitle").textContent = "Practice all Teddy missions.";
      renderItem();
    }

    function prepareItem(item){
      const copy = JSON.parse(JSON.stringify(item));
      if(copy.type === "choice") copy.shuffledOptions = shuffle(copy.options);
      if(copy.type === "dialogue") copy.tileObjects = shuffle(copy.tiles.map((t,i)=>({id:`tile_${i}_${Math.random().toString(36).slice(2)}`, text:t})));
      if(copy.type === "matching"){
        copy.leftShuffled = shuffle(copy.left);
        copy.rightShuffled = shuffle([...new Set(copy.right)]);
      }
      if(copy.type === "sorting") copy.cardsShuffled = shuffle(copy.cards);
      if(copy.type === "frame") copy.parts = copy.parts.map(p => ({...p, options:shuffle(p.options)}));
      return copy;
    }

    function scoredTotal(){
      return currentItems.filter(item => !item.noScore).length;
    }

    function updateProgress(){
      const total = currentItems.length;
      const possible = scoredTotal();
      $("progressText").textContent = `Question ${Math.min(index+1,total)} of ${total}`;
      $("scoreText").textContent = possible ? `Score: ${score} / ${possible}` : "Presentation mode";
      $("progressFill").style.width = `${(index / total) * 100}%`;
    }

    function renderItem(){
      answered = false;
      selectedOption = null;
      builtTiles = [];
      matchAnswers = {};
      feedbackBox.className = "feedback";
      feedbackBox.innerHTML = "";
      checkBtn.classList.remove("hidden");
      nextBtn.classList.add("hidden");
      nextBtn.textContent = "Next";
      undoBtn.classList.add("hidden");
      resetBtn.classList.add("hidden");
      checkBtn.disabled = false;
      updateProgress();

      const item = currentItems[index];
      $("missionTitle").textContent = item.missionTitle || currentMission.title;
      $("activityLabel").textContent = item.activity || currentMission.title;
      $("missionInstruction").textContent = item.instruction || "Choose the best answer.";

      if(item.type === "choice") renderChoice(item);
      if(item.type === "dialogue") renderDialogue(item);
      if(item.type === "matching") renderMatching(item);
      if(item.type === "frame") renderFrame(item);
      if(item.type === "sorting") renderSorting(item);
      if(item.type === "cards") renderCards(item);
      if(item.type === "type") renderType(item);
    }

    function renderBlocks(item){
      let html = "";
      if(item.context) html += `<div class="context-box">${escapeHtml(item.context)}</div>`;
      if(item.prompt) html += `<div class="prompt-box"><div class="prompt">${escapeHtml(item.prompt)}</div></div>`;
      return html;
    }

    function renderChoice(item){
      questionArea.innerHTML = `
        ${renderBlocks(item)}
        <div class="options">
          ${item.shuffledOptions.map((opt,i)=>`
            <button class="option" data-value="${escapeHtml(opt)}">
              <span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>
            </button>
          `).join("")}
        </div>
      `;
      document.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => {
          if(answered) return;
          document.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedOption = btn.dataset.value;
        });
      });
    }

    function renderDialogue(item){
      questionArea.innerHTML = `
        <div class="dialogue-area" id="dialogueArea">
          ${item.speakers.map((speaker,i)=>`
            <div class="dialogue-line">
              <div class="speaker">Speaker ${escapeHtml(speaker)}</div>
              <div class="slot" data-slot="${i}"><span>Click a tile...</span></div>
            </div>
          `).join("")}
        </div>
        <div class="tile-bank">
          ${item.tileObjects.map(tile=>`<button class="tile" data-id="${tile.id}">${escapeHtml(tile.text)}</button>`).join("")}
        </div>
        <p class="mini-note" id="tileCounter">0/${item.speakers.length} tiles placed</p>
      `;
      undoBtn.classList.remove("hidden");
      resetBtn.classList.remove("hidden");
      undoBtn.disabled = true;
      resetBtn.disabled = false;
      document.querySelectorAll(".tile").forEach(btn => {
        btn.addEventListener("click", () => {
          if(answered || btn.disabled || builtTiles.length >= item.speakers.length) return;
          const tile = item.tileObjects.find(t => t.id === btn.dataset.id);
          builtTiles.push(tile);
          btn.disabled = true;
          btn.classList.add("disabled");
          updateDialogueSlots(item);
        });
      });
    }

    function updateDialogueSlots(item){
      document.querySelectorAll(".slot").forEach((slot,i)=>{
        const tile = builtTiles[i];
        slot.className = tile ? "slot filled" : "slot";
        slot.querySelector("span").textContent = tile ? tile.text : "Click a tile...";
      });
      $("tileCounter").textContent = `${builtTiles.length}/${item.speakers.length} tiles placed`;
      undoBtn.disabled = builtTiles.length === 0 || answered;
    }

    function renderMatching(item){
      questionArea.innerHTML = `
        <div class="match-grid">
          ${item.leftShuffled.map(left=>`
            <div class="match-card">
              <div class="match-left">${escapeHtml(left)}</div>
              <select data-left="${escapeHtml(left)}">
                <option value="">Choose...</option>
                ${item.rightShuffled.map(right=>`<option value="${escapeHtml(right)}">${escapeHtml(right)}</option>`).join("")}
              </select>
            </div>
          `).join("")}
        </div>
      `;
      document.querySelectorAll("select[data-left]").forEach(sel => {
        sel.addEventListener("change", () => { matchAnswers[sel.dataset.left] = sel.value; });
      });
    }

    function renderFrame(item){
      questionArea.innerHTML = `
        ${renderBlocks(item)}
        <div class="frame-grid">
          ${item.parts.map((part,i)=>`
            <div class="frame-card">
              <div class="frame-label">${escapeHtml(part.label)}</div>
              <div class="frame-line">
                ${escapeHtml(part.before)}
                <select data-frame-index="${i}">
                  <option value="">Choose...</option>
                  ${part.options.map(opt=>`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join("")}
                </select>
                ${escapeHtml(part.after)}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderSorting(item){
      questionArea.innerHTML = `
        <div class="sort-grid">
          ${item.cardsShuffled.map((card,i)=>`
            <div class="sort-row">
              <div class="sort-text">${escapeHtml(card.text)}</div>
              <select data-sort-index="${i}">
                <option value="">Choose...</option>
                ${item.groups.map(g=>`<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join("")}
              </select>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCards(item){
      checkBtn.classList.add("hidden");
      nextBtn.classList.remove("hidden");
      nextBtn.textContent = "Next";
      questionArea.innerHTML = `
        <div class="flash-grid">
          ${item.cards.map((card,i)=>`
            <button class="flash-card" type="button" data-card-index="${i}" aria-label="Flip card: ${escapeHtml(card.front)}">
              <span class="flash-inner">
                <span class="flash-face flash-front">
                  <span class="flash-emoji">${escapeHtml(card.emoji || "✨")}</span>
                  <span class="flash-word">${escapeHtml(card.front)}</span>
                </span>
                <span class="flash-face flash-back">
                  <span class="flash-meaning">${escapeHtml(card.back)}</span>
                  <span class="mini-note">Click again to flip back.</span>
                </span>
              </span>
            </button>
          `).join("")}
        </div>
        <p class="flash-hint">Click or tap a card to flip it.</p>
      `;
      document.querySelectorAll(".flash-card").forEach(card => {
        card.addEventListener("click", event => {
          event.preventDefault();
          card.classList.toggle("flipped");
        });
      });
    }

    function renderType(item){
      questionArea.innerHTML = `
        ${renderBlocks(item)}
        <div class="target-box">
          ${item.prompt ? `<div class="prompt">${escapeHtml(item.prompt)}</div>` : ""}
          <input id="typeInput" class="type-input" type="text" autocomplete="off" placeholder="Type in Spanish..." />
        </div>
      `;
      setTimeout(() => $("typeInput").focus(), 50);
    }

    function checkAnswer(){
      if(answered) return;
      const item = currentItems[index];
      let correct = false;
      let answerText = "";
      let feedback = item.feedback || "";

      if(item.type === "choice"){
        if(!selectedOption){ showFeedback(false,"Choose an answer first."); return; }
        correct = selectedOption === item.answer;
        answerText = item.answer;
        markChoice(item);
      }

      if(item.type === "dialogue"){
        if(builtTiles.length !== item.speakers.length){ showFeedback(false,"Use all the tiles first."); return; }
        const sequence = builtTiles.map(t => t.text);
        correct = item.accepted.some(pattern => arraysEqual(pattern, sequence));
        answerText = item.accepted[0].join(" / ");
        markDialogue(item, sequence);
      }

      if(item.type === "matching"){
        if(item.left.some(left => !matchAnswers[left])){ showFeedback(false,"Match every card first."); return; }
        correct = item.left.every(left => matchAnswers[left] === item.pairs[left]);
        answerText = item.left.map(left => `${escapeHtml(left)} → ${escapeHtml(item.pairs[left])}`).join("<br>");
        markMatching(item);
      }

      if(item.type === "frame"){
        const selects = [...document.querySelectorAll("select[data-frame-index]")];
        if(selects.some(sel => !sel.value)){ showFeedback(false,"Complete every blank first."); return; }
        correct = selects.every(sel => sel.value === item.parts[Number(sel.dataset.frameIndex)].correct);
        answerText = escapeHtml(item.displayAnswer);
        selects.forEach(sel => {
          const expected = item.parts[Number(sel.dataset.frameIndex)].correct;
          sel.classList.add(sel.value === expected ? "correct-select" : "incorrect-select");
          sel.disabled = true;
        });
      }

      if(item.type === "sorting"){
        const selects = [...document.querySelectorAll("select[data-sort-index]")];
        if(selects.some(sel => !sel.value)){ showFeedback(false,"Choose a group for every expression first."); return; }
        correct = selects.every(sel => sel.value === item.cardsShuffled[Number(sel.dataset.sortIndex)].group);
        answerText = item.cardsShuffled.map(card => `${escapeHtml(card.text)} → ${escapeHtml(card.group)}`).join("<br>");
        selects.forEach(sel => {
          const expected = item.cardsShuffled[Number(sel.dataset.sortIndex)].group;
          sel.classList.add(sel.value === expected ? "correct-select" : "incorrect-select");
          sel.disabled = true;
        });
      }

      if(item.type === "type"){
        const input = $("typeInput");
        if(!input.value.trim()){ showFeedback(false,"Type your answer first."); return; }
        correct = item.answers.map(normalizeText).includes(normalizeText(input.value));
        answerText = escapeHtml(item.displayAnswer);
        input.classList.add(correct ? "correct-input" : "incorrect-input");
        input.disabled = true;
      }

      answered = true;
      if(correct && !item.noScore) score += 1;
      updateProgress();
      $("progressFill").style.width = `${((index + 1) / currentItems.length) * 100}%`;
      showFeedback(correct, correct ? (feedback || "Correct.") : (feedback || "Try again."), answerText);
      checkBtn.classList.add("hidden");
      nextBtn.classList.remove("hidden");
      undoBtn.disabled = true;
      resetBtn.disabled = true;
    }

    function arraysEqual(a,b){ return a.length === b.length && a.every((x,i)=>x === b[i]); }

    function markChoice(item){
      document.querySelectorAll(".option").forEach(btn => {
        btn.disabled = true;
        if(btn.dataset.value === item.answer) btn.classList.add("correct");
        if(btn.dataset.value === selectedOption && selectedOption !== item.answer) btn.classList.add("incorrect");
      });
    }

    function markDialogue(item, sequence){
      const firstAccepted = item.accepted[0];
      document.querySelectorAll(".slot").forEach((slot,i)=>{
        slot.classList.add(sequence[i] === firstAccepted[i] ? "correct-slot" : "incorrect-slot");
      });
      document.querySelectorAll(".tile").forEach(btn => btn.disabled = true);
    }

    function markMatching(item){
      document.querySelectorAll("select[data-left]").forEach(sel => {
        const expected = item.pairs[sel.dataset.left];
        sel.classList.add(sel.value === expected ? "correct-select" : "incorrect-select");
        sel.disabled = true;
      });
    }

    function showFeedback(correct, message, answerText=""){
      feedbackBox.className = `feedback show ${correct ? "ok" : "bad"}`;
      if(answered){
        feedbackBox.innerHTML = `
          <div>${correct ? "✅ Correct!" : "💡 Not quite."} ${escapeHtml(message)}</div>
          ${answerText ? `<div class="answer-line">Correct answer:<br>${answerText}</div>` : ""}
        `;
      }else{
        feedbackBox.innerHTML = `<div>${escapeHtml(message)}</div>`;
      }
    }

    function nextItem(){
      index += 1;
      if(index >= currentItems.length){
        showResults();
      }else{
        renderItem();
      }
    }

    function showResults(){
      menuView.classList.add("hidden");
      gameView.classList.add("hidden");
      resultView.classList.remove("hidden");
      $("topMenuBtn").classList.remove("hidden");
      const possible = scoredTotal();
      if(possible === 0){
        $("finalScore").textContent = "Practice complete";
        $("finalMessage").textContent = "Review the cards again whenever you want.";
        return;
      }
      $("finalScore").textContent = `${score} / ${possible}`;
      const pct = Math.round((score / possible) * 100);
      $("finalMessage").textContent = pct >= 85 ? "Excellent work!" : pct >= 65 ? "Good work. Try again to improve!" : "Keep practicing. You can try again!";
    }

    function resetCurrentItem(){ renderItem(); }

    function undoDialogue(){
      const removed = builtTiles.pop();
      if(!removed) return;
      const btn = document.querySelector(`.tile[data-id="${removed.id}"]`);
      if(btn){ btn.disabled = false; btn.classList.remove("disabled"); }
      const item = currentItems[index];
      updateDialogueSlots(item);
    }

    $("allPracticeBtn").addEventListener("click", startAllPractice);
    $("menuBtn").addEventListener("click", showMenu);
    $("topMenuBtn").addEventListener("click", showMenu);
    $("resultsMenuBtn").addEventListener("click", showMenu);
    $("tryAgainBtn").addEventListener("click", () => lastMissionId === "all" ? startAllPractice() : startMission(lastMissionId || missions[0].id));
    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextItem);
    undoBtn.addEventListener("click", undoDialogue);
    resetBtn.addEventListener("click", resetCurrentItem);

    initMenu();
    showMenu();
  </script>
</body>
</html>
